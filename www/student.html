<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Chat | Course Recommender</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Include Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <a href="index.html" class="logo">NitinChatBot</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="student.html" class="active">Student Portal</a>
            <a href="admin.html">Admin Dashboard</a>
        </nav>
    </header>

    <main class="container">
        <div class="chat-container glass-panel">
            <div class="chat-messages" id="chat-messages">
                <div class="message bot">
                    Hello! I'm your course recommendation assistant. What topic are you interested in learning about? (e.g., React, Node, Python, Database)
                </div>
            </div>
            
            <form class="chat-input-area" id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" required>
                <button type="submit" class="btn btn-primary" aria-label="Send Message">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
    <script src="student.js"></script>
</body>
</html>
